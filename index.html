<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Roulette</title>
    <link rel="stylesheet" href="style.css" /> 
  </head>
  <body>
    <main class="app">
      <section class="card">
        <h1>Family Roulette</h1>
        <p class="subtitle">
          Click the button to see who goes first.
        </p>
 
        <div class="image-frame">
          <img id="foodImage" src="Images/Placeholder.JPEG" alt="Food option" />
          <div id="questionMark">?</div>
        </div>
 
        <h2 id="foodResult">Ready?</h2>
        <p id="foodMessage"></p>
 
        <button id="pickButton">Pick for me</button>
      </section>
    </main>
 
    <script src="script.js"></script> 
  </body>
</html>
